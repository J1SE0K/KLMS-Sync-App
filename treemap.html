<meta charset="UTF-8">
<title>klms-notes-sync — 코드 트리맵</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'SF Mono', 'Menlo', monospace; background: #0d1117; color: #e6edf3; }
  h1 { padding: 16px 20px 4px; font-size: 15px; font-weight: 600; color: #8b949e; letter-spacing: 0.04em; }
  #legend { display: flex; gap: 16px; padding: 8px 20px 12px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #8b949e; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
  #chart { width: 100vw; height: calc(100vh - 80px); }
  .node rect {
    stroke: #0d1117;
    stroke-width: 1.5px;
    rx: 3;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .node rect:hover { opacity: 0.82; }
  .node text {
    font-size: 10px;
    fill: rgba(255,255,255,0.88);
    pointer-events: none;
    dominant-baseline: middle;
  }
  .node .filename { font-size: 11px; font-weight: 600; }
  .node .lines-label { font-size: 9px; fill: rgba(255,255,255,0.55); }
  .dir-label {
    font-size: 11px;
    font-weight: 700;
    fill: rgba(255,255,255,0.4);
    pointer-events: none;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  #tooltip {
    position: fixed;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 12px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s;
    max-width: 280px;
    z-index: 100;
  }
  #tooltip .tip-path { color: #8b949e; font-size: 10px; margin-bottom: 4px; }
  #tooltip .tip-name { color: #e6edf3; font-weight: 700; margin-bottom: 6px; }
  #tooltip .tip-lines { color: #58a6ff; }
  #tooltip .tip-type { color: #8b949e; font-size: 10px; margin-top: 4px; }
</style>

        { name: 'download_klms_media_via_safari.js', lines: 342, ext: 'js' },
        { name: 'notify_klms_reminders.js',   lines:  300, ext: 'js' },
        { name: 'export_panopto_transcripts.js', lines: 274, ext: 'js' },
        { name: 'sync_klms_calendar_jxa.js',  lines:  414, ext: 'js' },
        { name: 'fetch_active_safari_page.js', lines: 108, ext: 'js' },

        { name: 'sync_klms_calendar_suite.swift',  lines:  824, ext: 'swift' },

    },

      ]
    },
    {

      children: [
        { name: 'download_klms_media_via_safari.js', lines: 342, ext: 'js' },
        { name: 'download_klms_files_xhr_simple.js', lines: 310, ext: 'js' },
        { name: 'export_panopto_transcripts.js',     lines: 274, ext: 'js' },
        { name: 'fetch_active_safari_page.js',       lines: 108, ext: 'js' },
        { name: 'extract_document_text.swift',       lines: 147, ext: 'swift' },
        { name: 'README.md',                         lines:  14, ext: 'md' },
      ]
    },
    {
      name: 'docs',
      children: [
        { name: 'feature-behavior.md',      lines: 148, ext: 'md' },
        { name: 'sync-workflows.md',        lines: 133, ext: 'md' },
        { name: 'repository-layout.md',     lines:  65, ext: 'md' },
        { name: 'publication-checklist.md', lines:  55, ext: 'md' },
        { name: 'README.md',               lines:  10, ext: 'md' },
      ]
    },
    {
      name: 'root',
      children: [
        { name: 'README.md',               lines: 122, ext: 'md' },
        { name: 'install_launch_agent.sh', lines: 133, ext: 'sh' },
        { name: 'SECURITY.md',            lines:  35, ext: 'md' },
        { name: 'THIRD_PARTY_NOTICES.md', lines:  29, ext: 'md' },
      ]
    }
  ]
};

// Legend
const legendEl = document.getElementById('legend');
Object.entries(EXT_LABEL).forEach(([ext, label]) => {
  legendEl.innerHTML += `<div class="legend-item">
    <div class="legend-dot" style="background:${EXT_COLOR[ext]}"></div>
    <span>${label}</span>
  </div>`;
});

// Compute value for leaves
function computeValues(node) {
  if (node.lines !== undefined) {
    node.value = node.lines;
  } else if (node.children) {
    node.children.forEach(computeValues);
    node.value = node.children.reduce((s, c) => s + (c.value || 0), 0);
  }
}
computeValues(data);

const chart = document.getElementById('chart');
const W = window.innerWidth;
const H = window.innerHeight - 80;
chart.style.width = W + 'px';
chart.style.height = H + 'px';

const svg = d3.select('#chart').append('svg')
  .attr('width', W).attr('height', H);

const root = d3.hierarchy(data)
  .sum(d => d.lines || 0)
  .sort((a, b) => b.value - a.value);

d3.treemap()
  .size([W, H])
  .paddingOuter(8)
  .paddingTop(22)
  .paddingInner(2)
  .round(true)(root);

const tip = document.getElementById('tooltip');

// Draw groups
const node = svg.selectAll('g')
  .data(root.descendants())
  .join('g')
  .attr('class', 'node')
  .attr('transform', d => `translate(${d.x0},${d.y0})`);

// Background rects for all nodes
node.append('rect')
  .attr('width', d => Math.max(0, d.x1 - d.x0))
  .attr('height', d => Math.max(0, d.y1 - d.y0))
  .attr('fill', d => {
    if (!d.depth) return 'transparent';
    if (d.children) return DIR_COLOR;
    return EXT_COLOR[d.data.ext] || '#4b5563';
  })
  .attr('fill-opacity', d => {
    if (!d.depth) return 0;
    if (d.children) return 1;
    // Scale opacity by size for depth effect
    return 0.72 + Math.min(0.28, d.value / 6000 * 0.28);
  })
  .on('mousemove', function(event, d) {
    if (!d.data.lines) return;
    const pct = ((d.value / root.value) * 100).toFixed(1);
    const path = d.ancestors().reverse().slice(1).map(n => n.data.name).join(' / ');
    tip.innerHTML = `
      <div class="tip-path">${path.replace(' / ' + d.data.name, '')}</div>
      <div class="tip-name">${d.data.name}</div>
      <div class="tip-lines">${d.data.lines.toLocaleString()} lines  <span style="color:#8b949e">(${pct}%)</span></div>
      <div class="tip-type">${EXT_LABEL[d.data.ext] || d.data.ext}</div>
    `;
    tip.style.opacity = 1;
    tip.style.left = (event.clientX + 14) + 'px';
    tip.style.top  = (event.clientY - 10) + 'px';
  })
  .on('mouseleave', () => { tip.style.opacity = 0; });

// Directory labels
node.filter(d => d.depth > 0 && d.children)
  .append('text')
  .attr('class', 'dir-label')
  .attr('x', 5).attr('y', 14)
  .text(d => {
    const w = d.x1 - d.x0;
    const name = d.data.name;
    if (w < 40) return '';
    return name.length * 7 > w ? name.slice(0, Math.floor(w/7) - 1) + '…' : name;
  });

// File labels for leaves
node.filter(d => !d.children && d.depth > 0)
  .each(function(d) {
    const w = d.x1 - d.x0;
    const h = d.y1 - d.y0;
    if (w < 28 || h < 14) return;

    const g = d3.select(this);
    const name = d.data.name;
    const maxChars = Math.floor(w / 6.2);

    if (h >= 28) {
      g.append('text')
        .attr('class', 'filename')
        .attr('x', w / 2)
        .attr('y', h / 2 - 6)
        .attr('text-anchor', 'middle')
        .text(name.length > maxChars ? name.slice(0, maxChars - 1) + '…' : name);

      g.append('text')
        .attr('class', 'lines-label')
        .attr('x', w / 2)
        .attr('y', h / 2 + 8)
        .attr('text-anchor', 'middle')
        .text(d.data.lines.toLocaleString() + ' lines');
    } else {
      g.append('text')
        .attr('class', 'filename')
        .attr('x', w / 2)
        .attr('y', h / 2)
        .attr('text-anchor', 'middle')
        .text(name.length > maxChars ? name.slice(0, maxChars - 1) + '…' : name);
    }
  });

// Total count
const total = root.leaves().reduce((s, d) => s + (d.data.lines || 0), 0);
svg.append('text')
  .attr('x', W - 12).attr('y', H - 8)
  .attr('text-anchor', 'end')
  .attr('fill', '#30363d')
  .attr('font-size', 10)
  .text(`총 ${total.toLocaleString()} lines · ${root.leaves().length} files`);
</script>
